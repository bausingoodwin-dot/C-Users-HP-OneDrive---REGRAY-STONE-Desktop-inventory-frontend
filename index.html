<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Regray Inventory System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

    <header>
        <h1>Regray Inventory System</h1>
    </header>

    <!-- SUMMARY -->
    <section class="summary">
        <div class="card">
            <h3>Total Products</h3>
            <p id="totalProducts">0</p>
        </div>
        <div class="card">
            <h3>Total Stocks</h3>
            <p id="totalStocks">0</p>
        </div>
    </section>

    <!-- ADD PRODUCT -->
    <section class="form-section">
        <h2>Add New Product</h2>
        <form id="addProductForm">
            <input type="text" id="newProductName" placeholder="Product Name" required>
            <input type="text" id="newProductCategory" placeholder="Category" required>
            <button type="submit">Add Product</button>
        </form>
    </section>

    <!-- STOCK SECTION -->
    <section class="form-section">
        <h2>Stock Management</h2>
        <form id="stockForm">

            <select id="product" required></select>

            <input type="text" id="category" placeholder="Category" readonly>

            <input type="number" id="quantity" placeholder="Quantity" min="1" required>

            <div class="buttons">
                <button type="button" id="stockInBtn">Stock In</button>
                <button type="button" id="stockOutBtn" class="danger">Stock Out</button>
                <button type="button" id="exportBtn" class="export">Export CSV</button>
            </div>

        </form>
    </section>

    <!-- SEARCH -->
    <section class="search-box">
        <input 
            type="text" 
            id="search" 
            placeholder="Search product..." 
            aria-label="Search products">
    </section>

    <!-- TABLE -->
    <section class="table-section">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Quantity</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryTable"></tbody>
        </table>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
