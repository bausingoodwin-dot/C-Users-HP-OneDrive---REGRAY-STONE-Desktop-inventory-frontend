<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVIGATION -->
<div class="navbar">
    <button onclick="showDashboard()">Dashboard</button>
    <button onclick="showTransactions()">Transaction Log</button>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage">

    <h2>Inventory Dashboard</h2>

    <div class="summary">
        <p>Total Products: <span id="totalProducts">0</span></p>
        <p>Total Stock: <span id="totalStock">0</span></p>
    </div>

    <button onclick="addProduct()">Add Product</button>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Photo</th>
                <th>Name</th>
                <th>Category</th>
                <th>Size</th>
                <th>Unit</th>
                <th>Supplier</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Last Updated</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<!-- TRANSACTION LOG PAGE -->
<div id="transactionPage" style="display:none;">
    <h2>Transaction Log</h2>
    <table id="logTable">
        <thead>
            <tr>
                <th>Product</th>
                <th>Old Stock</th>
                <th>New Stock</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- IMAGE PREVIEW MODAL -->
<div id="imageModal" class="modal">
    <img id="modalImage">
</div>

<script src="script.js"></script>
</body>
</html>
