<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Inventory System</h2>
    <ul>
      <li id="dashboardLink">Dashboard</li>
      <li id="logLink">Transaction Log</li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- DASHBOARD PAGE -->
    <div id="dashboardPage">
      <div class="header">
        <h1>Inventory Dashboard</h1>
      </div>

      <!-- CARDS -->
      <div class="cards">
        <div class="card">
          <h3>Total Products</h3>
          <p id="totalProducts">0</p>
        </div>
        <div class="card">
          <h3>Total Stock</h3>
          <p id="totalStock">0</p>
        </div>
      </div>

      <!-- CONTROLS -->
      <div class="controls">
        <input type="text" id="searchBox" placeholder="Search products...">
        <button id="addBtn">+ Add Product</button>
      </div>

      <!-- TABLE -->
      <div class="table-container">
        <table id="inventoryTable">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Size</th>
              <th>Unit</th>
              <th>Supplier</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Last Updated</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- TRANSACTION LOG PAGE -->
    <div id="transactionPage" style="display:none;">
      <div class="header">
        <h1>Transaction Log</h1>
      </div>
      <div class="table-container">
        <table id="logTable">
          <thead>
            <tr>
              <th>Product</th>
              <th>Old Stock</th>
              <th>New Stock</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="modal">
  <img id="modalImage">
</div>

<script src="script.js"></script>
</body>
</html>
