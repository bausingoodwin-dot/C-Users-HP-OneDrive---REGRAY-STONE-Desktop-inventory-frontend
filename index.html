<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Inventory System SPA</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
<h1>Ultimate Inventory System</h1>
</header>

<nav class="main-nav">
  <button id="dashboardBtn">Dashboard</button>
  <button id="transactionsBtn">Transactions</button>
</nav>

<!-- DASHBOARD -->
<section id="dashboardSection">

<section class="summary">
<div class="card">
<h3>Total Products</h3>
<p id="totalProducts">0</p>
</div>
<div class="card">
<h3>Total Stocks</h3>
<p id="totalStocks">0</p>
</div>
</section>

<section class="form-section">
<h2>Add New Product</h2>
<form id="addProductForm">
<input type="text" id="name" placeholder="Product Name" required>
<select id="category" required>
<option value="">Select Category</option>
<option>PATAGONIA</option>
<option>QUARTZITE</option>
<option>ONYX</option>
<option>MARBLE</option>
<option>TRAVERTINE</option>
<option>LIMESTONE</option>
<option>GRANITE</option>
<option>CRAZY CUT</option>
<option>COBBLESTONE</option>
</select>
<input type="number" id="quantity" placeholder="Quantity" required>
<input type="file" id="image">
<button type="submit">Add Product</button>
</form>
</section>

<section class="form-section">
<h2>Stock Management</h2>
<select id="productSelect"><option value="">Select Product</option></select>
<input type="number" id="stockQty" placeholder="Quantity">
<button id="stockInBtn">Stock In</button>
<button id="stockOutBtn">Stock Out</button>
</section>

<section class="search-filter">
<h2>Search & Filter</h2>
<input type="text" id="search" placeholder="Search product">
<select id="categoryFilter">
<option value="">All Categories</option>
<option>PATAGONIA</option>
<option>QUARTZITE</option>
<option>ONYX</option>
<option>MARBLE</option>
<option>TRAVERTINE</option>
<option>LIMESTONE</option>
<option>GRANITE</option>
<option>CRAZY CUT</option>
<option>COBBLESTONE</option>
</select>
</section>

<section class="charts">
<h2>Stock per Category</h2>
<canvas id="categoryChart" width="400" height="200"></canvas>
</section>

<section class="table-section">
<h2>Inventory</h2>
<table>
<thead>
<tr>
<th>Image</th>
<th>Product</th>
<th>Category</th>
<th>Stock</th>
<th>Action</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>
</section>

<button id="exportInventoryBtn">Export Inventory CSV</button>
</section>

<!-- TRANSACTIONS -->
<section id="transactionsSection" style="display:none;">
<h2>All Transactions</h2>
<table>
<thead>
<tr>
<th>Date</th>
<th>Product</th>
<th>Type</th>
<th>Quantity</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>
<button id="exportTransactionsBtn">Export Transactions CSV</button>
</section>

<script src="script.js"></script>
</body>
</html>
