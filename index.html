<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Inventory</h2>
        <ul>
            <li>Dashboard</li>
            <li>Products</li>
            <li>Suppliers</li>
            <li>Settings</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <h1>Inventory Dashboard</h1>
        </div>

        <!-- SUMMARY CARDS -->
        <div class="cards">
            <div class="card">
                <h3>Total Products</h3>
                <p id="totalProducts">0</p>
            </div>
            <div class="card">
                <h3>Total Stock</h3>
                <p id="totalStock">0</p>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <input type="text" id="searchBox" placeholder="Search products...">
            <input type="file" id="imageInput" accept="image/*">
            <button id="addBtn">+ Add Product</button>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th onclick="sortTable(1)">Product Name</th>
                        <th onclick="sortTable(2)">Category</th>
                        <th onclick="sortTable(3)">Size</th>
                        <th onclick="sortTable(4)">Unit</th>
                        <th onclick="sortTable(5)">Supplier</th>
                        <th onclick="sortTable(6)">Unit Price</th>
                        <th onclick="sortTable(7)">Stock</th>
                        <th onclick="sortTable(8)">Updated</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="modal">
    <img id="modalImage" alt="Preview">
</div>

<script src="script.js"></script>

</body>
</html>
