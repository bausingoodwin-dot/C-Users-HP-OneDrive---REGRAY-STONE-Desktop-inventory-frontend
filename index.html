<!DOCTYPE html>
<html>

<head>

<title>Ultimate Inventory System</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Inventory Dashboard</h1>

<div class="summary">

<div class="card">
<h3>Total Products</h3>
<p id="totalProducts">0</p>
</div>

<div class="card">
<h3>Total Stocks</h3>
<p id="totalStocks">0</p>
</div>

</div>


<h2>Add Product</h2>

<form id="addProductForm">

<input type="text" id="name" placeholder="Product Name" required>

<select id="category" required>

<option value="">Select Category</option>

<option>PATAGONIA</option>
<option>QUARTZITE</option>
<option>ONYX</option>
<option>MARBLE</option>
<option>TRAVERTINE</option>
<option>LIMESTONE</option>
<option>GRANITE</option>
<option>CRAZY CUT</option>
<option>COBBLESTONE</option>

</select>

<input type="number" id="quantity" placeholder="Quantity" required>

<input type="file" id="image">

<button type="submit">Add Product</button>

</form>


<h2>Stock Control</h2>

<select id="productSelect">

<option value="">Select Product</option>

</select>

<input type="number" id="stockQty" placeholder="Quantity">

<button id="stockInBtn">Stock In</button>

<button id="stockOutBtn">Stock Out</button>



<h2>Search</h2>

<input type="text" id="search" placeholder="Search product">



<h2>Inventory</h2>

<table>

<thead>

<tr>
<th>Image</th>
<th>Product</th>
<th>Category</th>
<th>Stock</th>
<th>Action</th>
</tr>

</thead>

<tbody id="inventoryTable"></tbody>

</table>


<h2>Transactions</h2>

<table>

<thead>

<tr>
<th>Date</th>
<th>Product</th>
<th>Type</th>
<th>Quantity</th>
</tr>

</thead>

<tbody id="historyTable"></tbody>

</table>


<button id="exportBtn">Export CSV</button>

<script src="script.js"></script>

</body>

</html>
