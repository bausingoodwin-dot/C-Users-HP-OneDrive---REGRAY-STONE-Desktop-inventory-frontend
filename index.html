<!DOCTYPE html>
<html>
<head>
    <title>Regray Inventory System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Regray Inventory System</h1>

    <!-- SUMMARY -->
    <div class="summary">
        <div class="card">
            <h3>Total Products</h3>
            <p id="totalProducts">0</p>
        </div>
        <div class="card">
            <h3>Total Stocks</h3>
            <p id="totalStocks">0</p>
        </div>
    </div>

    <!-- ADD PRODUCT -->
    <div class="form-section">
        <h2>Add New Product</h2>
        <input type="text" id="newProductName" placeholder="Product Name">
        <input type="text" id="newProductCategory" placeholder="Category">
        <button onclick="addProduct()">Add Product</button>
    </div>

    <!-- STOCK SECTION -->
    <div class="form-section">
        <h2>Stock Management</h2>

        <select id="product"></select>
        <input type="text" id="category" placeholder="Category" readonly>
        <input type="number" id="quantity" placeholder="Quantity">

        <div class="buttons">
            <button onclick="stockIn()">Stock In</button>
            <button onclick="stockOut()" class="danger">Stock Out</button>
            <button onclick="exportCSV()" class="export">Export CSV</button>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="search" placeholder="Search product..." onkeyup="renderTable()">
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
