<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Inventory</h2>
        <ul>
            <li><a href="#" id="dashboardLink">Dashboard</a></li>
            <li><a href="#" id="logLink">Transaction Log</a></li>
        </ul>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="main" id="mainPage">
        <div class="header">
            <h1>Inventory Dashboard</h1>
        </div>

        <!-- CARDS -->
        <div class="cards">
            <div class="card">
                <h3>Total Products</h3>
                <p id="totalProducts">0</p>
            </div>
            <div class="card">
                <h3>Total Stock</h3>
                <p id="totalStock">0</p>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <input type="text" id="searchBox" placeholder="Search products...">
            <input type="file" id="imageInput" accept="image/*">
            <button id="addBtn">+ Add Product</button>
        </div>

        <!-- INVENTORY TABLE -->
        <div class="table-container">
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Size</th>
                        <th>Unit</th>
                        <th>Supplier</th>
                        <th>Unit Price</th>
                        <th>Current Stock</th>
                        <th>Updated</th>
                        <th>Undo</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- TRANSACTION LOG -->
    <div class="main" id="transactionPage" style="display:none;">
        <div class="header">
            <h1>Transaction Log</h1>
        </div>
        <div class="table-container">
            <table id="transactionLogTable">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Old Stock</th>
                        <th>New Stock</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div>

<!-- IMAGE PREVIEW MODAL -->
<div id="imageModal" class="modal">
    <img id="modalImage">
</div>

<script src="script.js"></script>
</body>
</html>
