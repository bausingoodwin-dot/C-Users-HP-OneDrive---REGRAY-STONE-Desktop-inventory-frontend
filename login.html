<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="stylesheet" href="login.css">

<!-- Redirect if already logged in -->
<script>
if(localStorage.getItem("adminLoggedIn") === "true"){
    window.location.href = "index.html";
}
</script>

</head>
<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <form id="loginForm" autocomplete="off" novalidate>
    <!-- Hidden dummy password field to stop browser prompts -->
    <input type="password" style="display:none">
    
    <input type="text" id="username" name="username" placeholder="Username" autocomplete="off" required>
    <input type="password" id="password" name="password" placeholder="Password" autocomplete="new-password" required>
    <button type="submit">Login</button>
    <p id="error" style="color:red; margin-top:10px;"></p>
  </form>
</div>

<script src="login.js"></script>
</body>
</html>
